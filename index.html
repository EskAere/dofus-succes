<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dofus Progress Tracker</title>
  <meta name="description" content="Track your Dofus level, succès and leaderboard ranking progress over time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="header-emblem">⚔</div>
    <h1>Dofus Tracker</h1>
  </header>

  <!-- ═══ ENTRY FORM ═══ -->
  <section class="section form-section" id="form-section">
    <form id="entry-form" autocomplete="off">
      <div class="form-grid">
        <div class="form-group">
          <label for="input-date">Date</label>
          <input type="date" id="input-date" required>
        </div>
        <div class="form-group">
          <label for="input-level">Niveau</label>
          <input type="number" id="input-level" min="1" placeholder="1" required>
        </div>
        <div class="form-group">
          <label for="input-level-rank">Rang Niveau</label>
          <input type="number" id="input-level-rank" min="1" placeholder="50000" required>
        </div>
        <div class="form-group">
          <label for="input-succes">Succès</label>
          <input type="number" id="input-succes" min="0" placeholder="1000" required>
        </div>
        <div class="form-group">
          <label for="input-succes-rank">Rang Succès</label>
          <input type="number" id="input-succes-rank" min="1" placeholder="30000" required>
        </div>
        <div class="form-group form-submit">
          <button type="submit" id="btn-add">
            <span class="btn-icon">+</span> Ajouter
          </button>
        </div>
      </div>
    </form>
  </section>

  <!-- ═══ DASHBOARD ═══ -->
  <section class="section" id="dashboard">
    <div class="cards-grid" id="stat-cards">
      <!-- Filled by JS -->
    </div>
  </section>

  <!-- ═══ CHARTS ═══ -->
  <section class="section" id="charts-section">
    <div class="charts-grid">
      <div class="chart-card">
        <h2 class="chart-title">📈 Niveau & Classement</h2>
        <div class="chart-wrapper">
          <canvas id="chart-level"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2 class="chart-title">🏆 Succès & Classement</h2>
        <div class="chart-wrapper">
          <canvas id="chart-succes"></canvas>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ HISTORY ═══ -->
  <section class="section" id="history-section">
    <button class="toggle-btn" id="toggle-history">
      📜 Historique <span class="toggle-arrow">▼</span>
    </button>
    <div class="history-content hidden" id="history-content">
      <table id="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Niveau</th>
            <th>Rang Niv.</th>
            <th>Succès</th>
            <th>Rang Suc.</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="history-body">
          <!-- Filled by JS -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- ═══ DATA ACTIONS ═══ -->
  <section class="section data-actions" id="data-actions">
    <button class="btn-secondary" id="btn-export">💾 Exporter JSON</button>
    <label class="btn-secondary btn-import-label" for="file-import">📂 Importer JSON</label>
    <input type="file" id="file-import" accept=".json" hidden>
  </section>

  <!-- ═══ TOAST ═══ -->
  <div class="toast hidden" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
